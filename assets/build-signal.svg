<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" role="img" aria-labelledby="title desc">
  <title id="title">Jason build signal</title>
  <desc id="desc">A dashboard-style graphic highlighting Jason's current build themes: AI learning systems, agent workflows, and polished product experiences.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="55%" stop-color="#10203d" />
      <stop offset="100%" stop-color="#1b1230" />
    </linearGradient>
    <radialGradient id="glowA" cx="0%" cy="0%" r="110%">
      <stop offset="0%" stop-color="#7af0b6" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#7af0b6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="100%" cy="100%" r="120%">
      <stop offset="0%" stop-color="#ff935c" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ff935c" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#d5e3ff" stroke-opacity="0.08" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#04070d" flood-opacity="0.35" />
    </filter>
    <style>
      .mono {
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .small {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1.8px;
      }

      .body {
        font-size: 17px;
        font-weight: 500;
      }

      .headline {
        font-size: 34px;
        font-weight: 700;
      }

      .chip {
        font-size: 14px;
        font-weight: 600;
      }

      .node-label {
        font-size: 13px;
        font-weight: 600;
      }

      .pulse {
        animation: pulse 4.8s ease-in-out infinite;
      }

      .pulse-slow {
        animation: pulse 7s ease-in-out infinite;
      }

      .float {
        animation: float 6.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.72; }
        50% { opacity: 1; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }
    </style>
  </defs>

  <rect width="900" height="340" rx="26" fill="url(#bg)" />
  <rect width="900" height="340" rx="26" fill="url(#grid)" />
  <circle cx="180" cy="40" r="180" fill="url(#glowA)" />
  <circle cx="785" cy="270" r="180" fill="url(#glowB)" />

  <g filter="url(#shadow)">
    <rect x="24" y="24" width="852" height="292" rx="22" fill="#0e1728" fill-opacity="0.9" stroke="#d5e3ff" stroke-opacity="0.09" />
  </g>

  <g class="mono">
    <text x="56" y="76" fill="#7af0b6" class="small">CURRENT BUILD SIGNAL</text>
    <text x="56" y="122" fill="#f5f7fb" class="headline">AI, learning, and product</text>
    <text x="56" y="158" fill="#f5f7fb" class="headline">craft in the same loop.</text>
    <text x="56" y="198" fill="#b7c5e0" class="body">I keep returning to projects that make thinking easier,</text>
    <text x="56" y="224" fill="#b7c5e0" class="body">workflows tighter, and interfaces cleaner.</text>

    <g transform="translate(56 250)">
      <rect width="132" height="34" rx="17" fill="#13253f" stroke="#7af0b6" stroke-opacity="0.38" />
      <circle cx="20" cy="17" r="5" fill="#7af0b6" class="pulse" />
      <text x="34" y="22" fill="#eef7f2" class="chip">learning tools</text>
    </g>

    <g transform="translate(198 250)">
      <rect width="142" height="34" rx="17" fill="#221a33" stroke="#ff935c" stroke-opacity="0.42" />
      <circle cx="20" cy="17" r="5" fill="#ff935c" class="pulse-slow" />
      <text x="34" y="22" fill="#fff1e8" class="chip">agent workflows</text>
    </g>

    <g transform="translate(350 250)">
      <rect width="132" height="34" rx="17" fill="#162334" stroke="#7dc4ff" stroke-opacity="0.38" />
      <circle cx="20" cy="17" r="5" fill="#7dc4ff" class="pulse" />
      <text x="34" y="22" fill="#edf6ff" class="chip">product polish</text>
    </g>
  </g>

  <g transform="translate(612 172)" class="float">
    <circle cx="0" cy="0" r="78" fill="none" stroke="#7dc4ff" stroke-opacity="0.22" stroke-dasharray="5 8">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 0 0" to="360 0 0" dur="24s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="54" fill="none" stroke="#7af0b6" stroke-opacity="0.28" stroke-dasharray="3 6">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="360 0 0" to="0 0 0" dur="18s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="12" fill="#ff935c" />
    <circle cx="0" cy="0" r="28" fill="#ff935c" fill-opacity="0.12" class="pulse" />
    <text x="-41" y="-26" fill="#fff2e8" class="mono small">AI x LEARNING</text>
  </g>

  <g class="mono" fill="none" stroke-linecap="round">
    <path d="M612 172 L720 94" stroke="#7af0b6" stroke-opacity="0.45" stroke-width="2" />
    <path d="M612 172 L742 156" stroke="#7dc4ff" stroke-opacity="0.45" stroke-width="2" />
    <path d="M612 172 L708 246" stroke="#ff935c" stroke-opacity="0.45" stroke-width="2" />
    <path d="M612 172 L512 106" stroke="#d5e3ff" stroke-opacity="0.28" stroke-width="1.6" />
    <path d="M612 172 L502 228" stroke="#d5e3ff" stroke-opacity="0.28" stroke-width="1.6" />
  </g>

  <g class="mono">
    <g transform="translate(720 94)">
      <circle r="11" fill="#7af0b6" />
      <circle r="24" fill="#7af0b6" fill-opacity="0.12" class="pulse" />
      <text x="18" y="-4" fill="#eef7f2" class="node-label">LessonForge</text>
      <text x="18" y="14" fill="#a9bbc9" font-size="11">education UI</text>
    </g>

    <g transform="translate(742 156)">
      <circle r="10" fill="#7dc4ff" />
      <circle r="20" fill="#7dc4ff" fill-opacity="0.12" class="pulse-slow" />
      <text x="18" y="-4" fill="#edf6ff" class="node-label">hackscan</text>
      <text x="18" y="14" fill="#a9bbc9" font-size="11">agents + ops</text>
    </g>

    <g transform="translate(708 246)">
      <circle r="10" fill="#ff935c" />
      <circle r="20" fill="#ff935c" fill-opacity="0.12" class="pulse" />
      <text x="18" y="-4" fill="#fff2e8" class="node-label">gowild-planner</text>
      <text x="18" y="14" fill="#a9bbc9" font-size="11">resilient flows</text>
    </g>

    <g transform="translate(512 106)">
      <circle r="8" fill="#d5e3ff" fill-opacity="0.92" />
      <text x="-72" y="-10" fill="#d5e3ff" class="node-label">frontend rhythm</text>
      <text x="-72" y="8" fill="#8ea4ba" font-size="11">clean surfaces</text>
    </g>

    <g transform="translate(502 228)">
      <circle r="8" fill="#d5e3ff" fill-opacity="0.92" />
      <text x="-86" y="-10" fill="#d5e3ff" class="node-label">tooling systems</text>
      <text x="-86" y="8" fill="#8ea4ba" font-size="11">fewer rough edges</text>
    </g>
  </g>
</svg>
