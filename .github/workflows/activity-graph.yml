name: GitHub-Profile-3D-Contrib

on:
  schedule: # 03:00 JST == 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-3d-contrib
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
          USERNAME: ${{ github.repository_owner }}
      # README only embeds profile-night-rainbow.svg; drop the other generated
      # variants so we don't re-commit ~1.7 MB of unused SVGs every day.
      # To switch variants, change the filename here AND in README.md.
      - name: Keep only the displayed variant
        run: find profile-3d-contrib -type f -name '*.svg' ! -name 'profile-night-rainbow.svg' -delete
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated"; then
            git push
          fi
