name: Update GitHub metrics

on:
  schedule:
    - cron: "23 6 * * *"  # daily at 06:23 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-metrics
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # lowlighter/metrics renders the SVG and self-commits it to `filename`
      # (output_action defaults to `commit`, message "Update <filename> - [Skip GitHub Action]").
      - name: Generate metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ github.token }}
          user: Jason-Latz
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Chicago
          config_display: columns
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_lines: yes
